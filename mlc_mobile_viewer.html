<style>
  :root{
    --bg:#0a0c10; --panel:#12151b; --panel-2:#171b22; --line:#232833;
    --green:#35c98c; --red:#e8433a; --amber:#e0a83a; --muted:#6b7280; --text:#e7e9ee;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:'SF Mono','IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
    -webkit-font-smoothing:antialiased;
    min-height:100vh; min-height:100dvh;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, var(--bg) 70%, transparent);
    padding:18px 18px 10px;
  }
  h1{margin:0; font-size:15px; font-weight:700; letter-spacing:.02em; color:var(--text);}
  .sub{margin-top:4px; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .live-dot{width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0;}
  .live-dot.stale{background:var(--muted);}
  .live-dot.err{background:var(--red);}

  .alert-bar{display:flex; align-items:center; gap:6px; margin-top:10px; flex-wrap:wrap;}
  .alert-btn{
    display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
    padding:6px 10px; border-radius:8px; border:1px solid var(--line); background:var(--panel);
    color:var(--muted); -webkit-appearance:none;
  }
  .alert-btn.on{color:var(--green); border-color:rgba(53,201,140,.5); background:rgba(53,201,140,.1);}
  .alert-btn.warn{color:var(--amber); border-color:rgba(224,168,58,.5); background:rgba(224,168,58,.1);}
  .alert-toast{
    position:fixed; left:14px; right:14px; top:calc(10px + env(safe-area-inset-top));
    z-index:50; background:var(--red); color:#fff; font-size:12px; font-weight:700;
    padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.4);
    display:none; align-items:center; justify-content:space-between; gap:8px;
  }
  .alert-toast button{background:none; border:none; color:#fff; font-size:14px; padding:0 4px;}

  .sub-panel{
    margin:0 14px 14px; background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; font-size:11px; color:var(--muted); line-height:1.6;
  }
  .sub-panel code{color:var(--text); background:var(--panel-2); padding:1px 4px; border-radius:4px;}
  .sub-panel textarea{
    width:100%; height:90px; margin:8px 0; background:var(--panel-2); color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:8px; font-size:10px;
    font-family:inherit; resize:vertical;
  }
  main{padding:6px 14px 40px;}
  .grid{display:grid; grid-template-columns:1fr; gap:10px;}
  @media(min-width:520px){ .grid{grid-template-columns:1fr 1fr;} }

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; position:relative; overflow:hidden;
  }
  .card.onair{border-color:rgba(232,67,58,.5);}
  .card-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .studio-name{font-size:17px; font-weight:700;}
  .broadcast-name{
    font-size:11px; color:var(--muted); margin-top:2px; max-width:100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .onair-badge{
    font-size:10px; font-weight:700; color:var(--red); background:rgba(232,67,58,.12);
    border:1px solid rgba(232,67,58,.4); border-radius:6px; padding:3px 7px; flex-shrink:0;
  }

  .card-body{display:flex; align-items:flex-start; justify-content:flex-end; gap:10px;}
  .rows{flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:7px;}
  .row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel-2); border-radius:9px; padding:8px 11px;
  }
  .row-left{display:flex; align-items:center; gap:9px;}
  .dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .dot.green{background:var(--green); box-shadow:0 0 6px rgba(53,201,140,.6);}
  .dot.red{background:var(--red); box-shadow:0 0 6px rgba(232,67,58,.6);}
  .dot.gray{background:var(--muted);}
  .row-label{font-size:13px; font-weight:600;}
  .row-onair{font-size:10px; font-weight:700; color:var(--red);}
  .row-status{font-size:10px; color:var(--muted);}

  .live-preview{
    flex:0 0 auto; aspect-ratio:9/16; width:auto;
    border-radius:9px; overflow:hidden; background:#000; position:relative;
  }
  .live-preview video{ width:100%; height:100%; object-fit:cover; display:block; background:#000; }
  .live-preview .ph{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:11px; background:var(--panel-2);
  }
  .live-src-badge{
    position:absolute; top:6px; left:6px; font-size:9px; font-weight:700; padding:2px 6px;
    border-radius:4px; background:rgba(0,0,0,.55); color:var(--green); letter-spacing:.04em; pointer-events:none;
  }
  .live-controls{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; align-items:center; justify-content:center; padding:6px 0;
    background:linear-gradient(0deg, rgba(0,0,0,.8), transparent);
  }
  .mute-btn{
    width:22px; height:22px; border-radius:50%; border:none; background:rgba(255,255,255,.18);
    color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0;
  }
  .vol-slider{ display:none; }

  .empty{text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; line-height:1.7;}
  .empty b{color:var(--text);}

  .refresh-fab{
    position:fixed; right:18px; bottom:calc(18px + env(safe-area-inset-bottom));
    width:46px; height:46px; border-radius:50%; background:var(--panel);
    border:1px solid var(--line); color:var(--text); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }
  .refresh-fab.spinning{animation:spin 0.7s linear;}
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .skeleton{
    background:linear-gradient(90deg, var(--panel-2) 25%, #1e232c 37%, var(--panel-2) 63%);
    background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:9px; height:34px;
  }
  @keyframes shimmer{ 0%{background-position:100% 0;} 100%{background-position:0 0;} }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
</head>
<body>

<header>
  <h1>MLC 모바일 멀티뷰어</h1>
  <div class="sub"><span class="live-dot" id="liveDot"></span><span id="statusText">연결 중...</span></div>
  <div class="alert-bar">
    <button class="alert-btn" id="notifyBtn">🔔 신호끊김 알림 꺼짐</button>
    <button class="alert-btn" id="wakeBtn">📱 화면유지 꺼짐</button>
    <button class="alert-btn" id="testAlertBtn">🧪 알림 테스트</button>
    <button class="alert-btn" id="subscribeBtn">📅 방송예고 구독</button>
  </div>
</header>

<div class="alert-toast" id="alertToast">
  <span id="alertToastMsg"></span>
  <button id="alertToastClose">✕</button>
</div>

<div class="sub-panel" id="subPanel" style="display:none;">
  <p>방송예고(30/15/10/5분 전) 알림을 받으려면, 아래 내용을 통째로 복사해서
  GitHub 저장소의 <code>subscriptions.json</code> 파일에 추가해달라고 하면 됨
  (배열 안에 항목 하나로 추가).</p>
  <textarea id="subText" readonly></textarea>
  <button class="alert-btn" id="subCopyBtn">📋 복사하기</button>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;"></div>
</main>

<button class="refresh-fab" id="refreshBtn" aria-label="새로고침">↻</button>

<script>
const API_URL = "https://mlc-api.cjoshopping.com/external/public/api/streamhistory/dashboard/v2/live";
const STUDIO_LIST = ["M1","M2","M3","M5","M6","A","B","C","E","ETC1","ETC2"]; // M4는 이중화 대상 없음
const CHECK_INTERVAL = 5000; // ms

const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const statusText = document.getElementById('statusText');

let consecutiveFailures = 0;
let cardBuilt = false;
const cardRefs = {};      // studio -> {root, name, badge, master, slave, preview, srcBadge, video, muteBtn, volSlider}

const videoPrefs = {};    // studio -> {muted, volume} - 사용자가 조절한 값은 다음 갱신에도 유지

// isRecording(공식 방송중, onair)이었던 채널이 healthy=false로 바뀌는 순간만 알림.
// (원래부터 꺼져있던/방송 예정 없는 채널까지 알리면 노이즈가 너무 많아짐)
const notifyBtn = document.getElementById('notifyBtn');
const wakeBtn = document.getElementById('wakeBtn');
const testAlertBtn = document.getElementById('testAlertBtn');
const alertToast = document.getElementById('alertToast');

let notifyEnabled = localStorage.getItem('mlc_notify_enabled') === '1';
let wakeLock = null;
let wakeEnabled = localStorage.getItem('mlc_wake_enabled') === '1';
const prevOnair = {};   // studio -> {master: bool, slave: bool} - 직전 onair 상태
const alerted = {};     // studio -> {master: bool, slave: bool} - 이미 알림 보냈는지(복구 전까지 중복 방지)
STUDIO_LIST.forEach(s => { prevOnair[s] = {master:false, slave:false}; alerted[s] = {master:false, slave:false}; });

function playAlertBeep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [0, 0.28].forEach(offset => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, now + offset);
      gain.gain.exponentialRampToValueAtTime(0.25, now + offset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.22);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + offset);
      osc.stop(now + offset + 0.25);
    });
  }catch(e){ /* Web Audio 미지원 환경 - 조용히 무시 */ }
}

function showToast(message){
  alertToastMsg.textContent = message;
  alertToast.style.display = 'flex';
}
alertToastClose.addEventListener('click', () => { alertToast.style.display = 'none'; });

function fireSignalAlert(studio, sideLabel){
  const message = `⚠ ${studio} ${sideLabel} 신호 끊김`;
  showToast(message);
  playAlertBeep();
  if(navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
  if(notifyEnabled && 'Notification' in window && Notification.permission === 'granted'){
    try{ new Notification('MLC 신호끊김', { body: `${studio} 스튜디오 ${sideLabel} 신호가 끊겼습니다.`, tag: `mlc-${studio}-${sideLabel}` }); }
    catch(e){ /* 일부 브라우저는 Notification 생성자 자체를 막을 수 있음 - 무시 */ }
  }
}

async function updateNotifyBtnUI(){
  if('Notification' in window && Notification.permission === 'denied'){
    notifyBtn.textContent = '🔕 알림 차단됨(브라우저 설정 필요)';
    notifyBtn.className = 'alert-btn warn';
    return;
  }
  notifyBtn.textContent = notifyEnabled ? '🔔 신호끊김 알림 켜짐' : '🔔 신호끊김 알림 꺼짐';
  notifyBtn.className = notifyEnabled ? 'alert-btn on' : 'alert-btn';
}

notifyBtn.addEventListener('click', async () => {
  if(!notifyEnabled){
    if('Notification' in window && Notification.permission !== 'granted'){
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ await updateNotifyBtnUI(); return; }
    }
    notifyEnabled = true;
  } else {
    notifyEnabled = false;
  }
  localStorage.setItem('mlc_notify_enabled', notifyEnabled ? '1' : '0');
  await updateNotifyBtnUI();
});

function updateWakeBtnUI(){
  wakeBtn.textContent = wakeEnabled && wakeLock ? '📱 화면유지 켜짐' : '📱 화면유지 꺼짐';
  wakeBtn.className = wakeEnabled && wakeLock ? 'alert-btn on' : 'alert-btn';
}

async function acquireWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { updateWakeBtnUI(); });
  }catch(e){ wakeLock = null; }
  updateWakeBtnUI();
}

wakeBtn.addEventListener('click', async () => {
  if(!('wakeLock' in navigator)){
    showToast('이 브라우저는 화면유지(Wake Lock)를 지원하지 않습니다.');
    return;
  }
  if(!wakeEnabled){
    wakeEnabled = true;
    await acquireWakeLock();
  } else {
    wakeEnabled = false;
    if(wakeLock){ wakeLock.release(); wakeLock = null; }
  }
  localStorage.setItem('mlc_wake_enabled', wakeEnabled ? '1' : '0');
  updateWakeBtnUI();
});

testAlertBtn.addEventListener('click', () => {
  fireSignalAlert('테스트', 'MASTER');
});

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

const subscribeBtn = document.getElementById('subscribeBtn');
const subPanel = document.getElementById('subPanel');
const subText = document.getElementById('subText');
const subCopyBtn = document.getElementById('subCopyBtn');

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW 등록 실패', e));
}

subscribeBtn.addEventListener('click', async () => {
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    showToast('이 브라우저는 방송예고 알림(Push)을 지원하지 않습니다.');
    return;
  }
  if(Notification.permission !== 'granted'){
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){ showToast('알림 권한을 허용해야 방송예고 알림을 받을 수 있습니다.'); return; }
  }
  try{
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    subText.value = JSON.stringify(sub.toJSON(), null, 2);
    subPanel.style.display = 'block';
    subText.select();
  }catch(e){
    console.error(e);
    showToast('구독 생성 실패: ' + e.message);
  }
});

subCopyBtn.addEventListener('click', async () => {
  try{
    await navigator.clipboard.writeText(subText.value);
    showToast('복사됨 - GitHub의 subscriptions.json에 붙여넣어줘.');
  }catch(e){
    subText.select();
    showToast('자동복사 실패 - 텍스트 길게눌러 직접 복사해줘.');
  }
});

// 화면을 다시 보게 되면(백그라운드→포그라운드) 화면유지를 재요청함 - 브라우저가
// 백그라운드 진입 시 wakeLock을 자동 해제하기 때문
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && wakeEnabled && !wakeLock) acquireWakeLock();
});

function fmtStudioRow(label, info){
  if(!info){
    return `<div class="row">
      <div class="row-left"><span class="dot gray"></span><span class="row-label">${label}</span></div>
      <span class="row-status">정보없음</span>
    </div>`;
  }
  const dotClass = info.healthy ? 'green' : 'red';
  const onairHtml = info.onair ? '<span class="row-onair">● ON AIR</span>' : `<span class="row-status">${info.healthy ? '정상' : '이상'}</span>`;
  return `<div class="row">
    <div class="row-left"><span class="dot ${dotClass}"></span><span class="row-label">${label}</span></div>
    ${onairHtml}
  </div>`;
}

// --- 카드 골격은 딱 한 번만 만들고, 이후에는 내용만 갱신함(영상이 5초마다 안 끊기도록) ---
function buildCards(){
  grid.innerHTML = STUDIO_LIST.map(studio => `
    <div class="card" id="card-${studio}">
      <div class="card-top">
        <div>
          <div class="studio-name">${studio}</div>
          <div class="broadcast-name" id="name-${studio}" style="display:none;"></div>
        </div>
        <span class="onair-badge" id="badge-${studio}" style="display:none;">방송중</span>
      </div>
      <div class="card-body">
        <div class="rows">
          <div id="master-${studio}"></div>
          <div id="slave-${studio}"></div>
        </div>
        <div class="live-preview" id="preview-${studio}" style="display:none;">
          <span class="live-src-badge" id="srcbadge-${studio}"></span>
          <video id="video-${studio}" muted playsinline autoplay></video>
          <div class="live-controls">
            <button class="mute-btn" id="mute-${studio}">🔇</button>
            <input type="range" class="vol-slider" id="vol-${studio}" min="0" max="1" step="0.05" value="1">
          </div>
        </div>
      </div>
    </div>
  `).join('');

  STUDIO_LIST.forEach(studio => {
    cardRefs[studio] = {
      root: document.getElementById(`card-${studio}`),
      name: document.getElementById(`name-${studio}`),
      badge: document.getElementById(`badge-${studio}`),
      rows: document.querySelector(`#card-${studio} .rows`),
      master: document.getElementById(`master-${studio}`),
      slave: document.getElementById(`slave-${studio}`),
      preview: document.getElementById(`preview-${studio}`),
      srcBadge: document.getElementById(`srcbadge-${studio}`),
      video: document.getElementById(`video-${studio}`),
      muteBtn: document.getElementById(`mute-${studio}`),
      volSlider: document.getElementById(`vol-${studio}`),
    };
    activeSide[studio] = null;
    videoPrefs[studio] = { muted: true, volume: 1 };

    const r = cardRefs[studio];
    r.muteBtn.addEventListener('click', () => {
      const nowMuted = !r.video.muted;
      r.video.muted = nowMuted;
      videoPrefs[studio].muted = nowMuted;
      r.muteBtn.textContent = nowMuted ? '🔇' : '🔊';
      if(!nowMuted) r.video.play().catch(()=>{});
    });
    r.volSlider.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      r.video.volume = v;
      videoPrefs[studio].volume = v;
    });

  });
  cardBuilt = true;
}

// --- 영상 미리보기 높이를 MASTER/SLAVE 2줄 기준이 아니라 3줄 높이 기준으로 맞춤 ---
// (flex/aspect-ratio만으로는 세로 비율 때문에 높이가 먼저 커져버리는 문제가 있어,
// rows의 실제 렌더링 높이(2줄+간격1개)에서 한 줄 높이를 역산한 뒤 3줄+간격2개로 계산함
// - 그러면 폭은 aspect-ratio로 자동 계산됨)
const ROWS_GAP = 7; // .rows CSS의 gap 값과 반드시 일치해야 함
function syncPreviewHeight(studio){
  const r = cardRefs[studio];
  if(!r || !r.rows) return;
  const twoRowH = r.rows.getBoundingClientRect().height; // 2줄 + 간격 1개
  if(twoRowH <= 0) return;
  const singleRowH = (twoRowH - ROWS_GAP) / 2;
  const threeRowH = singleRowH * 3 + ROWS_GAP * 2; // 3줄 + 간격 2개
  if(threeRowH > 0) r.preview.style.height = `${threeRowH}px`;
}

// --- 영상 재생/정지 (마스터<->슬레이브 전환이나 온에어 시작/종료 때만 호출됨) ---
function startVideo(studio, url, side){
  const r = cardRefs[studio];
  stopVideo(studio); // 혹시 이전 것이 남아있으면 먼저 정리

  r.preview.style.display = 'block';
  syncPreviewHeight(studio);
  r.srcBadge.textContent = side === 'master' ? 'MASTER' : 'SLAVE';
  r.video.muted = videoPrefs[studio].muted;
  r.video.volume = videoPrefs[studio].volume;
  r.muteBtn.textContent = r.video.muted ? '🔇' : '🔊';
  r.volSlider.value = videoPrefs[studio].volume;

  if(r.video.canPlayType('application/vnd.apple.mpegurl')){
    // iOS Safari 등 - 네이티브 HLS 지원
    r.video.src = url;
    r.video.play().catch(()=>{});
  } else if(window.Hls && window.Hls.isSupported()){
    // Android Chrome 등 - hls.js로 재생
    const hls = new Hls({ maxBufferLength: 10, liveSyncDurationCount: 2 });
    hls.loadSource(url);
    hls.attachMedia(r.video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => r.video.play().catch(()=>{}));
    hlsMap[studio] = hls;
  } else {
    r.preview.style.display = 'none'; // 재생 불가 환경이면 그냥 숨김 (위쪽 점 표시로 충분)
  }
}

function stopVideo(studio){
  const r = cardRefs[studio];
  if(hlsMap[studio]){ hlsMap[studio].destroy(); delete hlsMap[studio]; }
  r.video.pause();
  r.video.removeAttribute('src');
  r.video.load();
  r.preview.style.display = 'none';
}

function renderError(message){
  grid.style.display = 'none';
  emptyState.style.display = 'block';
  emptyState.innerHTML = `<b>연결할 수 없습니다</b><br>${message}<br><br>아래 새로고침 버튼으로 다시 시도해보세요.`;
  liveDot.className = 'live-dot err';
}

async function fetchAndRender(){
  refreshBtn.classList.add('spinning');
  try{
    const res = await fetch(API_URL, {
      headers: {'Accept': 'application/json'},
      cache: 'no-store',
    });
    if(!res.ok) throw new Error(`서버 응답 오류 (${res.status})`);
    const data = await res.json();
    const items = Array.isArray(data.result) ? data.result : [];

    const byStudio = {};
    // mappNm은 SCHEDULED(방송 예정) 상태일 때 스튜디오 코드가 아니라 담당자 이름으로
    // 오는 경우가 있어 신뢰 불가 - mainChnCd/subChnCd("prd_elemental_studio_M1_MASTER")
    // 에서 스튜디오 코드를 직접 추출함.
    const studioFromChnCd = (chncd) => {
      if(!chncd) return null;
      const m = /^prd_elemental_studio_(.+)_(MASTER|SLAVE)$/.exec(chncd);
      return m ? m[1] : null;
    };
    items.forEach(it => {
      const name = studioFromChnCd(it.mainChnCd) || studioFromChnCd(it.subChnCd);
      if(!STUDIO_LIST.includes(name)) return;
      const liveByType = {};
      (it.liveStateList || []).forEach(ls => { liveByType[ls.streamType] = ls; });
      const main = liveByType['MAIN'];
      const sub = liveByType['SUB'];
      // onair는 "실제로 방송 신호가 들어오고 있는지"를 뜻함 - isRecording(방송 시작됨)
      // 만으로는 부족하고, isHealthy(신호 정상 수신)까지 같이 참이어야 함.
      const newInfo = {
        master: main ? {onair: !!main.isRecording && !!main.isHealthy, healthy: !!main.isHealthy} : null,
        slave: sub ? {onair: !!sub.isRecording && !!sub.isHealthy, healthy: !!sub.isHealthy} : null,
        title: it.bdTit || '',
        mainUrl: it.mainRecvUrl || null,
        subUrl: it.subRecvUrl || null,
      };
      // 같은 스튜디오(mappNm)로 항목이 두 개 이상 올 수 있음 (예: 현재 방송 + 다음
      // 예정 방송이 동시에 내려오는 경우). 그냥 덮어쓰면 아직 시작 안 한/이미 끝난
      // 항목이 화면을 차지할 수 있으므로 우선순위를 매김: onair(공식 방송 중) > healthy
      // (신호는 있으나 아직 공식 방송 전) > 그 외. 그래야 신호만 먼저 들어온 항목이
      // 병합 단계에서 버려지지 않고 살아남아 영상 미리보기에 쓰일 수 있음.
      const rank = (s) => {
        if(!s) return 0;
        const onair = (s.master && s.master.onair) || (s.slave && s.slave.onair);
        if(onair) return 2;
        const healthy = (s.master && s.master.healthy) || (s.slave && s.slave.healthy);
        return healthy ? 1 : 0;
      };
      const existing = byStudio[name];
      if(!existing || rank(newInfo) > rank(existing)){
        byStudio[name] = newInfo;
      }
    });

    if(!cardBuilt) buildCards();
    grid.style.display = 'grid';
    emptyState.style.display = 'none';

    STUDIO_LIST.forEach(studio => {
      const info = byStudio[studio];
      const r = cardRefs[studio];
      const isOnair = info && ((info.master && info.master.onair) || (info.slave && info.slave.onair));

      r.root.classList.toggle('onair', !!isOnair);
      if(info && info.title){ r.name.style.display = 'block'; r.name.textContent = info.title; }
      else { r.name.style.display = 'none'; }
      r.badge.style.display = isOnair ? 'inline-block' : 'none';
      r.master.innerHTML = fmtStudioRow('MASTER', info ? info.master : null);
      r.slave.innerHTML = fmtStudioRow('SLAVE', info ? info.slave : null);

      // 신호끊김 감지: 직전에 onair(정상 송출 중)였던 쪽이 이번엔 healthy=false가 되면
      // 딱 한 번만 알림 (복구되기 전까지 재알림 안 함, 5초마다 스팸 방지)
      ['master','slave'].forEach(side => {
        const cur = info && info[side];
        const nowOnair = !!(cur && cur.onair);
        const nowHealthy = !!(cur && cur.healthy);
        if(prevOnair[studio][side] && !nowHealthy && !alerted[studio][side]){
          fireSignalAlert(studio, side === 'master' ? 'MASTER' : 'SLAVE');
          alerted[studio][side] = true;
        }
        if(nowHealthy) alerted[studio][side] = false; // 복구되면 다음 끊김 때 다시 알릴 수 있게 초기화
        prevOnair[studio][side] = nowOnair;
      });

      // 지금 실제로 송출 중인 쪽 판단 (마스터 우선 - 둘 다 켜져 있을 이유는 없지만 방어적으로)
      // 영상 미리보기는 "공식 방송 시작"(onair) 여부와 무관하게, 신호가 정상(healthy)
      // 이기만 하면 로드함 - 공식 대시보드도 방송 시작 전이라도 신호만 있으면 미리보기를
      // 띄우는 것과 동일하게 맞춤. ON AIR 배지/텍스트는 위 isOnair(onair 기준) 그대로 유지.
      let newSide = null, url = null;
      if(info && info.master && info.master.healthy && info.mainUrl){ newSide = 'master'; url = info.mainUrl; }
      else if(info && info.slave && info.slave.healthy && info.subUrl){ newSide = 'slave'; url = info.subUrl; }

      if(newSide !== activeSide[studio]){
        // 마스터<->슬레이브 전환 또는 온에어 시작/종료 - 이때만 영상을 새로 불러옴
        if(newSide) startVideo(studio, url, newSide);
        else stopVideo(studio);
        activeSide[studio] = newSide;
      }
    });

    consecutiveFailures = 0;
    liveDot.className = 'live-dot';
    const now = new Date();
    statusText.textContent = `${now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})} 기준 업데이트`;
  }catch(err){
    consecutiveFailures++;
    liveDot.className = 'live-dot stale';
    statusText.textContent = `업데이트 실패 (${consecutiveFailures}회 연속) - ${err.message}`;
    if(consecutiveFailures >= 3 && !cardBuilt){
      renderError('네트워크 연결을 확인하거나, 잠시 후 다시 시도해보세요.<br><span style="color:var(--muted);font-size:11px;">(브라우저 보안 정책으로 접속이 막혔을 수도 있습니다)</span>');
    }
  }finally{
    setTimeout(() => refreshBtn.classList.remove('spinning'), 400);
  }
}

refreshBtn.addEventListener('click', fetchAndRender);

window.addEventListener('resize', () => {
  STUDIO_LIST.forEach(studio => {
    const r = cardRefs[studio];
    if(r && r.preview.style.display === 'block') syncPreviewHeight(studio);
  });
});

updateNotifyBtnUI();
updateWakeBtnUI();
if(wakeEnabled) acquireWakeLock();

fetchAndRender();
setInterval(fetchAndRender, CHECK_INTERVAL);

// 백그라운드에 있다가 다시 돌아오면 즉시 한 번 갱신
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') fetchAndRender();
});
</script>
